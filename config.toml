[engine]
fps = 60
max_lookahead_ms = 1000

[effect]
active_effect = "beat_pulse"
beat_pulse_palette = [
    "#ff0000",
    "#00ff00",
    "#0000ff",
    "#ffff00",
]
beat_pulse_gamma = 2.0

[network]
interface = "auto"
passive_mode = "True"

[web]
enabled = "False"
host = "127.0.0.1"
port = 8080
cors_origins = "['http://localhost:5173', 'http://localhost:4173', 'http://localhost:8080']"

[devices.openrgb]
enabled = true
host = "127.0.0.1"
port = 6742
latency_strategy = "windowed_mean"
latency_ms = 10.0
manual_offset_ms = 0.0
max_fps = 60
latency_window_size = 60

[devices.lifx]
enabled = true
discovery_timeout_s = 10.0
default_kelvin = 3500
echo_probe_interval_s = 2.0
latency_strategy = "ema"
latency_ms = 50.0
manual_offset_ms = 0.0
max_fps = 60
latency_window_size = 60

[devices.govee]
enabled = true
discovery_timeout_s = 5.0
latency_strategy = "ema"
latency_ms = 100.0
manual_offset_ms = 0.0
max_fps = 40
latency_window_size = 60
probe_interval_s = 5.0

[discovery]
broadcast_interval_s = 30.0
unicast_concurrency = 50
unicast_timeout_s = 0.5
subnet_mask = 24

